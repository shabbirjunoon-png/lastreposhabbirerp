name: shabbir_erp
description: Shabbir ERP - Business Ledger & Inventory Management
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.2

  # Database — pinned below 2.4.0 to avoid JNI dependency (v1 embedding issue)
  sqflite: '>=2.3.3+1 <2.4.0'
  path: ^1.9.0

  # Firebase Auth
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  google_sign_in: ^6.2.1

  # Google Drive backup
  googleapis: ^13.2.0
  googleapis_auth: ^1.6.0
  http: ^1.2.2

  # File & path management — pinned <2.1.5 to avoid jni_flutter v1 embedding issue
  path_provider: '>=2.1.0 <2.1.5'
  share_plus: ^10.0.2

  # PDF generation
  pdf: ^3.11.1

  # Utilities
  intl: ^0.19.0
  uuid: ^4.5.1
  shared_preferences: ^2.3.3

  # Fonts — no manual download needed, loaded from Google CDN at runtime
  google_fonts: ^6.2.1

  # UI
  cupertino_icons: ^1.0.8

dependency_overrides:
  # Force old path_provider_android (no JNI) to fix Android v1 embedding build error
  path_provider_android: 2.2.12

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
