    intl: ^0.19.0
    uuid: ^4.5.1
    shared_preferences: ^2.3.3
    google_fonts: ^6.2.1
    cupertino_icons: ^1.0.8

  dependency_overrides:
    path_provider_android: 2.2.12

  dev_dependencies:
